services:
  kafka:
    image: confluentinc/cp-kafka:7.8.3
    container_name: kafka
    ports:
      - "9092:9092"

    environment:
      KAFKA_KRAFT_MODE: 'true'

      CLUSTER_ID: '1L6g7nGhU-eAKfL--X25wo'
      KAFKA_NODE_ID: 1

      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs

    volumes:
      - kafka_kraft:/var/lib/kafka/data

  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_DATABASE: mydb
      MYSQL_ROOT_PASSWORD: password
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - 3306:3306
    volumes:
      - db_data:/var/lib/mysql

  init_db:
    build: ./db
    container_name: init_db
    environment:
      DB_URL: mysql+pymysql://user:password@mysql/mydb
    depends_on:
      - mysql
    
  intel_service:
    build: ./intel_service
    container_name: intel_service
    environment:
      DB_URL: mysql+pymysql://user:password@mysql/mydb
      KAFKA_URI : kafka:9092
    depends_on:
      - mysql
      - kafka
      - init_db
  
  attack_service:
    build: ./attack_service
    container_name: attack_service
    environment:
      DB_URL: mysql+pymysql://user:password@mysql/mydb
      KAFKA_URI : kafka:9092
    depends_on:
      - mysql
      - kafka
      - init_db

  damage_service:
    build: ./damage_service
    container_name: damage_service
    environment:
      DB_URL: mysql+pymysql://user:password@mysql/mydb
      KAFKA_URI : kafka:9092
    depends_on:
      - mysql
      - kafka
      - init_db

volumes:
  kafka_kraft:
  db_data: